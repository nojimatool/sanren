<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>三連電卓</title>

  <style>
    :root{
      --bg1:#0a3b86;
      --bg2:#072e66;
      --panel:#244b86;
      --panel2:#1f4277;
      --edge:#08306a;
      --line:rgba(255,255,255,.15);

      --white:#f7f8fb;
      --white2:#eef1f6;

      --btnBlue1:#2f6fe4;
      --btnBlue2:#1744a8;
      --btnDeep1:#0a2a73;
      --btnDeep2:#041a4d;

      --btnOrange1:#f2a341;
      --btnOrange2:#dd7e11;
      --shadow:0 10px 20px rgba(0,0,0,.18);

      --r:18px;
      --gap:14px;

      --topH:74px;
      --safeB: env(safe-area-inset-bottom);
      --safeT: env(safe-area-inset-top);

      --tabH:44px;
      --tabPadX:18px;

      /* iPad全般の基準（大きくしすぎない・小さすぎない） */
      --dispH: clamp(58px, 9vh, 78px);
      --acH: clamp(44px, 7vh, 62px);

      --numFont: clamp(34px, 5.2vw, 64px);
      --opFont:  clamp(22px, 3.2vw, 40px);

      --rowH: clamp(44px, 6vh, 58px);
      --rowFont: clamp(18px, 2.4vw, 26px);

      --kbdGap: 12px;
      --kbdRadius: 16px;

      /* 横の時：キーボード狭く、列を広め（要望対応） */
      --kbdW_land: clamp(300px, 28vw, 380px);
      /* 縦の時：キーボード少し広め */
      --kbdW_port: clamp(300px, 42vw, 420px);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans",
                   "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow:hidden; /* 余白/スクロール抑止 */
      touch-action: manipulation; /* 変なダブルタップズーム抑止 */
    }

    /* 画面を「dvh」で固定（Safariの下バーで崩れない） */
    .app{
      height: 100dvh;
      padding: calc(10px + var(--safeT)) 12px calc(10px + var(--safeB));
      display:flex;
    }

    .frame{
      width:100%;
      height:100%;
      border-radius: 26px;
      background: linear-gradient(180deg, #0c3f8f, #062a5e);
      box-shadow: var(--shadow);
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow:hidden;
    }

    /* 上のタブ列 */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      height: var(--topH);
      flex: 0 0 auto;
    }

    .tabs{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:nowrap;
      overflow:hidden;
    }
    .tab{
      height: var(--tabH);
      min-width: 98px;
      padding: 0 var(--tabPadX);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.35);
      background: linear-gradient(180deg, #f2f4f8, #dde4ef);
      color:#17407b;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 6px 10px rgba(0,0,0,.12);
      user-select:none;
      cursor:pointer;
    }
    .tab.active{
      background: linear-gradient(180deg, #2f6fe4, #1744a8);
      color:#fff;
      border-color: rgba(255,255,255,.25);
    }

    .topRight{
      display:flex;
      align-items:center;
      gap:10px;
      flex: 0 0 auto;
    }
    .gear{
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: linear-gradient(180deg, #f2f4f8, #dde4ef);
      border: 1px solid rgba(255,255,255,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 6px 10px rgba(0,0,0,.12);
      user-select:none;
    }
    .miniBtn{
      width: 64px;
      height: 46px;
      border-radius: 12px;
      background: linear-gradient(180deg, #f2f4f8, #dde4ef);
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: 0 6px 10px rgba(0,0,0,.12);
    }

    /* メイン領域：左（リスト）＋右（キーボード） */
    .main{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns: 1fr var(--kbdW_port);
      gap: var(--gap);
      overflow:hidden;
    }

    /* 横向きは：リストを広く、キーボード狭く（要望） */
    @media (orientation: landscape){
      .main{
        grid-template-columns: 1fr var(--kbdW_land);
      }
    }

    /* 左側（リスト群） */
    .lists{
      min-height:0;
      display:grid;
      gap: var(--gap);
      overflow:hidden;
    }

    /* 縦（狭い）→ 1列（選択リストだけ表示） */
    .lists.one{
      grid-template-columns: 1fr;
    }

    /* 横（広い）→ 3列 */
    .lists.three{
      grid-template-columns: repeat(3, 1fr);
    }

    .listCard{
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border: 2px solid rgba(255,255,255,.18);
      border-radius: 22px;
      padding: 10px;
      display:flex;
      flex-direction:column;
      min-height:0;
      overflow:hidden;
    }

    .display{
      height: var(--dispH);
      border-radius: 18px;
      background: rgba(205,214,230,.8);
      border: 2px solid rgba(255,255,255,.25);
      box-shadow: inset 0 2px 0 rgba(255,255,255,.35);
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding: 0 16px;
      gap: 12px;
      flex: 0 0 auto;
      overflow:hidden;
    }
    .opBadge{
      font-size: var(--opFont);
      font-weight:800;
      color:#16335e;
      opacity:.95;
      flex: 0 0 auto;
    }
    .opBadge.neg{ color:#d12a2a; }
    .dispVal{
      font-size: var(--numFont);
      font-weight: 500;
      color:#111;
      letter-spacing: .02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow: ellipsis; /* 文字が切れないように */
      max-width: 100%;
    }

    .rows{
      margin-top:10px;
      flex:1 1 auto;
      min-height:0;
      background: rgba(255,255,255,.92);
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,.25);
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }

    .row{
      height: var(--rowH);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid rgba(0,0,0,.08);
      font-size: var(--rowFont);
      user-select:none;
    }
    .row:last-child{ border-bottom:none; }

    /* ← これが「選択中グレー」 */
    .row.selected{
      background: rgba(120,130,150,.18);
      outline: 2px solid rgba(60,80,120,.25);
      outline-offset: -2px;
    }

    .row .label{
      color:#222;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 58%;
    }
    .row .val{
      color:#111;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .row .val.neg{ color:#d12a2a; }

    .acBar{
      margin-top:10px;
      height: var(--acH);
      border-radius: 16px;
      background: linear-gradient(180deg, #f2f4f8, #dde4ef);
      border: 2px solid rgba(255,255,255,.35);
      box-shadow: 0 6px 10px rgba(0,0,0,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: clamp(26px, 3vw, 40px);
      color:#1d3f7c;
      user-select:none;
      flex: 0 0 auto;
      cursor:pointer;
    }

    /* 右側（キーボード） */
    .kbd{
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border: 2px solid rgba(255,255,255,.18);
      border-radius: 22px;
      padding: 12px;
      display:flex;
      flex-direction:column;
      min-height:0;
      overflow:hidden;
      gap: 10px;
    }

    .kbdTopTabs{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex: 0 0 auto;
    }
    .kbdTab{
      height: 44px;
      min-width: 98px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.35);
      background: linear-gradient(180deg, #f2f4f8, #dde4ef);
      color:#17407b;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 6px 10px rgba(0,0,0,.12);
      user-select:none;
    }
    .kbdTab.active{
      background: linear-gradient(180deg, #2f6fe4, #1744a8);
      color:#fff;
    }

    /* キーボード本体：縦長を目一杯使う（要望） */
    .grid{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--kbdGap);
    }

    /* 7行（数字4行 + 演算2行 + 1行）を「高さ100%で分配」 */
    .grid{
      grid-template-rows: repeat(7, 1fr);
    }

    .btn{
      border-radius: var(--kbdRadius);
      border: 2px solid rgba(255,255,255,.28);
      background: linear-gradient(180deg, #f7f8fb, #e7ebf3);
      box-shadow: 0 10px 14px rgba(0,0,0,.14);
      font-size: clamp(28px, 3.2vw, 46px);
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      cursor:pointer;
      touch-action: manipulation;
    }
    .btn:active{
      transform: translateY(1px);
      filter: brightness(.98);
    }

    .btn.blue{
      background: linear-gradient(180deg, var(--btnBlue1), var(--btnBlue2));
      color:#0b0b0b;
      border-color: rgba(255,255,255,.18);
      font-weight:700;
    }
    .btn.deep{
      background: linear-gradient(180deg, var(--btnDeep1), var(--btnDeep2));
      color:#fff;
      font-weight:700;
    }
    .btn.orange{
      background: linear-gradient(180deg, var(--btnOrange1), var(--btnOrange2));
      color:#fff;
      font-weight:800;
    }
    .btn.wide{
      grid-column: span 2;
    }

    /* 画面が狭い縦の場合：行間少し詰める */
    @media (max-width: 820px){
      :root{ --kbdGap: 10px; }
    }

    /* --- 編集モーダル（ダブルタップ文字入力の安定版） --- */
    .modalBack{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 9999;
    }
    .modal{
      width:min(640px, 92vw);
      background:#fff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,.25);
    }
    .modal h3{
      margin: 6px 6px 10px;
      font-size: 18px;
    }
    .modal input{
      width:100%;
      height: 52px;
      font-size: 16px; /* iOSズーム回避の最低サイズ */
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #c9d2e3;
      outline:none;
    }
    .modalBtns{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top: 12px;
    }
    .mBtn{
      height: 44px;
      min-width: 96px;
      border-radius: 12px;
      border: none;
      background:#e9eef7;
      font-weight:700;
      font-size: 16px;
    }
    .mBtn.ok{ background:#2f6fe4; color:#fff; }
  </style>
</head>

<body>
  <div class="app">
    <div class="frame">
      <div class="topbar">
        <div class="tabs" id="topTabs"></div>
        <div class="topRight">
          <div class="gear" title="設定">⚙️</div>
          <div class="miniBtn"></div>
          <div class="miniBtn"></div>
          <div class="miniBtn"></div>
          <div class="miniBtn"></div>
        </div>
      </div>

      <div class="main">
        <div class="lists" id="listsArea"></div>

        <div class="kbd">
          <div class="kbdTopTabs" id="kbdTabs"></div>

          <div class="grid" id="kbdGrid">
            <!-- row1 -->
            <div class="btn" data-k="7">7</div>
            <div class="btn" data-k="8">8</div>
            <div class="btn" data-k="9">9</div>
            <!-- row2 -->
            <div class="btn" data-k="4">4</div>
            <div class="btn" data-k="5">5</div>
            <div class="btn" data-k="6">6</div>
            <!-- row3 -->
            <div class="btn" data-k="1">1</div>
            <div class="btn" data-k="2">2</div>
            <div class="btn" data-k="3">3</div>
            <!-- row4 -->
            <div class="btn" data-k="0">0</div>
            <div class="btn" data-k="00">00</div>
            <div class="btn" data-k=".">.</div>

            <!-- row5 -->
            <div class="btn blue" data-k="pm">±</div>
            <div class="btn blue" data-k="mul">×</div>
            <div class="btn blue" data-k="add">+</div>

            <!-- row6 -->
            <div class="btn deep" data-k="c">C</div>
            <div class="btn blue" data-k="div">÷</div>
            <div class="btn blue" data-k="sub">−</div>

            <!-- row7 -->
            <div class="btn orange" data-k="undo">↩︎</div>
            <div class="btn orange" data-k="redo">↪︎</div>
            <div class="btn orange" data-k="eq">＝</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 編集モーダル（ダブルタップで開く） -->
  <div class="modalBack" id="modalBack">
    <div class="modal">
      <h3 id="modalTitle">編集</h3>
      <input id="modalInput" type="text" inputmode="text" autocomplete="off" autocapitalize="none" />
      <div class="modalBtns">
        <button class="mBtn" id="modalCancel">キャンセル</button>
        <button class="mBtn ok" id="modalOk">OK</button>
      </div>
    </div>
  </div>

  <script>
    /********************
     * データ
     ********************/
    const LIST_COUNT = 5;      // 上のタブ（List1-5）
    const COLUMN_COUNT = 3;    // 表示列（横は3列、縦は1列）

    const state = {
      activeList: 0,                 // 0-4
      columns: [0,1,2],              // 表示中の列がどのListを表示するか
      data: Array.from({length: LIST_COUNT}, () => ({
        display: "0",
        op: "",                      // 直近の演算子表示（＋等）
        rows: [],                    // {label, val}
        selectedIndex: -1,           // 選択中行
        input: "0",                  // 入力バッファ
        hasDot: false,
      })),
      // undo/redo（簡易）
      history: [],
      future: [],
    };

    /********************
     * 便利関数
     ********************/
    const fmt = (nStr) => {
      if (nStr === "" || nStr === "-" || nStr === ".") return nStr || "0";
      const neg = nStr.startsWith("-");
      let s = neg ? nStr.slice(1) : nStr;

      if (s.includes(".")) {
        const [a,b] = s.split(".");
        const a2 = a.replace(/^0+(?=\d)/,"").replace(/\B(?=(\d{3})+(?!\d))/g,",") || "0";
        return (neg?"-":"") + a2 + "." + (b ?? "");
      } else {
        const a2 = s.replace(/^0+(?=\d)/,"").replace(/\B(?=(\d{3})+(?!\d))/g,",") || "0";
        return (neg?"-":"") + a2;
      }
    };

    const pushHistory = () => {
      state.history.push(JSON.stringify(state.data));
      if (state.history.length > 80) state.history.shift();
      state.future.length = 0;
    };

    const undo = () => {
      if (!state.history.length) return;
      state.future.push(JSON.stringify(state.data));
      const prev = state.history.pop();
      state.data = JSON.parse(prev);
      render();
    };

    const redo = () => {
      if (!state.future.length) return;
      state.history.push(JSON.stringify(state.data));
      const next = state.future.pop();
      state.data = JSON.parse(next);
      render();
    };

    const isLandscape = () => window.matchMedia("(orientation: landscape)").matches;

    /********************
     * UI構築
     ********************/
    const topTabs = document.getElementById("topTabs");
    const kbdTabs = document.getElementById("kbdTabs");
    const listsArea = document.getElementById("listsArea");

    function buildTabs(){
      topTabs.innerHTML = "";
      for(let i=0;i<LIST_COUNT;i++){
        const b = document.createElement("div");
        b.className = "tab" + (state.activeList===i ? " active" : "");
        b.textContent = "List" + (i+1);
        b.addEventListener("click", () => {
          state.activeList = i;
          // 縦のときは表示列も追従（1列しか出さない）
          if(!isLandscape()){
            state.columns = [i, (i+1)%LIST_COUNT, (i+2)%LIST_COUNT];
          }
          render();
        });
        topTabs.appendChild(b);
      }

      kbdTabs.innerHTML = "";
      // キーボード側に「List1-3」みたいなのが欲しい時用（今は表示だけ）
      for(let j=0;j<3;j++){
        const li = state.columns[j];
        const t = document.createElement("div");
        t.className = "kbdTab" + (j===0 ? " active" : "");
        t.textContent = "List" + (li+1);
        // ここは飾り。必要なら「キーボード対象列」を切替にできる。
        kbdTabs.appendChild(t);
      }
    }

    function buildLists(){
      listsArea.innerHTML = "";
      const land = isLandscape();
      listsArea.className = "lists " + (land ? "three" : "one");

      const showCols = land ? 3 : 1;
      const cols = state.columns.slice(0, showCols);

      cols.forEach((listIndex, colIdx) => {
        const d = state.data[listIndex];

        const card = document.createElement("div");
        card.className = "listCard";
        card.dataset.listIndex = listIndex;

        const disp = document.createElement("div");
        disp.className = "display";
        const op = document.createElement("div");
        op.className = "opBadge" + (String(d.display).startsWith("-") ? " neg" : "");
        op.textContent = d.op || "";
        const val = document.createElement("div");
        val.className = "dispVal";
        val.textContent = fmt(d.display);
        disp.appendChild(op);
        disp.appendChild(val);

        const rows = document.createElement("div");
        rows.className = "rows";

        // 空でも行高さの揺れを抑えるため：最低1行
        const rowCount = Math.max(d.rows.length, 10);
        for(let i=0;i<rowCount;i++){
          const r = document.createElement("div");
          r.className = "row";
          if (i === d.selectedIndex) r.classList.add("selected");

          const label = document.createElement("div");
          label.className = "label";
          const value = document.createElement("div");
          value.className = "val";

          if(i < d.rows.length){
            label.textContent = d.rows[i].label ?? "";
            const v = String(d.rows[i].val ?? "");
            value.textContent = fmt(v);
            if (v.startsWith("-")) value.classList.add("neg");
          } else {
            label.textContent = "";
            value.textContent = "";
          }

          // 単タップ：選択（グレー枠）
          r.addEventListener("click", () => {
            // 空行は無視
            if(i >= d.rows.length) return;
            d.selectedIndex = i;
            render(); // 選択グレーの復活
          });

          // ダブルタップ：ラベル編集（iPadで一番安定する方法＝モーダル入力）
          attachDoubleTap(r, () => {
            if(i >= d.rows.length) return;
            openEditModal(listIndex, i);
          });

          r.appendChild(label);
          r.appendChild(value);
          rows.appendChild(r);
        }

        const ac = document.createElement("div");
        ac.className = "acBar";
        ac.textContent = "AC";
        ac.addEventListener("click", () => {
          pushHistory();
          d.display = "0";
          d.input = "0";
          d.hasDot = false;
          d.op = "";
          d.rows = [];
          d.selectedIndex = -1;
          render();
        });

        card.appendChild(disp);
        card.appendChild(rows);
        card.appendChild(ac);

        listsArea.appendChild(card);
      });
    }

    /********************
     * ダブルタップ（ズーム暴発しにくい実装）
     ********************/
    function attachDoubleTap(el, onDouble){
      let lastT = 0;
      el.addEventListener("touchend", (e) => {
        const now = Date.now();
        const dt = now - lastT;
        if (dt > 0 && dt < 320){
          e.preventDefault();
          onDouble();
          lastT = 0;
        } else {
          lastT = now;
        }
      }, {passive:false});

      // マウス（PC）
      el.addEventListener("dblclick", (e) => {
        e.preventDefault();
        onDouble();
      });
    }

    /********************
     * 文字入力（モーダル）
     ********************/
    const modalBack = document.getElementById("modalBack");
    const modalTitle = document.getElementById("modalTitle");
    const modalInput = document.getElementById("modalInput");
    const modalOk = document.getElementById("modalOk");
    const modalCancel = document.getElementById("modalCancel");

    let editTarget = { listIndex:-1, rowIndex:-1 };

    function openEditModal(listIndex, rowIndex){
      const d = state.data[listIndex];
      const row = d.rows[rowIndex];
      editTarget = { listIndex, rowIndex };

      modalTitle.textContent = `List${listIndex+1}：行${rowIndex+1} ラベル編集`;
      modalInput.value = row.label ?? "";
      modalBack.style.display = "flex";

      // iPadで確実にキーボード出す
      setTimeout(() => {
        modalInput.focus();
        modalInput.setSelectionRange(modalInput.value.length, modalInput.value.length);
      }, 50);
    }

    function closeModal(){
      modalBack.style.display = "none";
      editTarget = { listIndex:-1, rowIndex:-1 };
      // フォーカスを外してレイアウト崩れを防止
      modalInput.blur();
    }

    modalCancel.addEventListener("click", closeModal);
    modalBack.addEventListener("click", (e) => {
      if (e.target === modalBack) closeModal();
    });

    modalOk.addEventListener("click", () => {
      const {listIndex,rowIndex} = editTarget;
      if (listIndex < 0) return closeModal();
      pushHistory();
      state.data[listIndex].rows[rowIndex].label = modalInput.value.trim();
      closeModal();
      render();
    });

    /********************
     * 電卓入力（＋表記・演算子表記復活）
     ********************/
    const keyMap = {
      "add":"+",
      "sub":"−",
      "mul":"×",
      "div":"÷"
    };

    function currentListIndex(){
      // 縦の時：activeListに入れる
      if(!isLandscape()) return state.activeList;
      // 横の時：キーボードは「一番左の列（columns[0]）」に入れる（今の動きに近い）
      return state.columns[0];
    }

    function setOp(listIndex, op){
      const d = state.data[listIndex];
      d.op = op;              // ← これが「＋押した時の表記」
      d.display = d.input;    // 表示は入力
    }

    function applyOp(listIndex, op){
      const d = state.data[listIndex];
      // ここはシンプルに「入力を1行として積む」挙動（あなたの運用に合わせやすい）
      // opを押したら行を追加し、op表示を更新する
      const num = d.input === "" ? "0" : d.input;
      d.rows.unshift({ label:"", val:num });
      d.selectedIndex = 0;
      setOp(listIndex, op);
      d.input = "0";
      d.hasDot = false;
      d.display = "0";
    }

    function onKey(k){
      const li = currentListIndex();
      const d = state.data[li];

      // 押すたびに履歴積むと重いので「編集系だけ」
      const needHist = ["c","undo","redo","eq","add","sub","mul","div","pm"].includes(k) === false
        ? false
        : true;

      if (k === "undo") return undo();
      if (k === "redo") return redo();

      if (k === "c"){
        pushHistory();
        d.input = "0"; d.display="0"; d.op=""; d.hasDot=false;
        render();
        return;
      }

      if (k === "pm"){
        pushHistory();
        if (d.input.startsWith("-")) d.input = d.input.slice(1);
        else if (d.input !== "0") d.input = "-" + d.input;
        d.display = d.input;
        render();
        return;
      }

      if (k === "."){
        if (!d.hasDot){
          if (d.input === "" || d.input === "0") d.input = "0.";
          else d.input += ".";
          d.hasDot = true;
          d.display = d.input;
          render();
        }
        return;
      }

      if (k === "add" || k === "sub" || k === "mul" || k === "div"){
        pushHistory();
        applyOp(li, keyMap[k]);   // ← ＋/−/×/÷ 押下時の表記を確実に出す
        render();
        return;
      }

      if (k === "eq"){
        pushHistory();
        // ＝は「入力を確定して1行追加」扱い
        const num = d.input === "" ? "0" : d.input;
        d.rows.unshift({ label:"", val:num });
        d.selectedIndex = 0;
        d.op = "";               // ＝後は演算子表示消す
        d.input = "0";
        d.hasDot = false;
        d.display = "0";
        render();
        return;
      }

      // 数字
      if (/^\d+$/.test(k)){
        if (d.input === "0" && !d.hasDot) d.input = k;
        else d.input += k;
        d.display = d.input;
        render();
      }
    }

    document.getElementById("kbdGrid").addEventListener("click", (e) => {
      const btn = e.target.closest(".btn");
      if(!btn) return;
      const k = btn.dataset.k;
      onKey(k);
    });

    /********************
     * レンダリング
     ********************/
    function render(){
      buildTabs();
      buildLists();
    }

    // 初期：列割り当て（横で3列見たい想定）
    state.columns = [0,1,2];

    // 画面回転でレイアウトを自動最適化
    window.addEventListener("resize", () => {
      // 横→縦で1列になったとき、表示対象をactiveListに追従
      if(!isLandscape()){
        state.columns = [state.activeList, (state.activeList+1)%LIST_COUNT, (state.activeList+2)%LIST_COUNT];
      }
      render();
    });

    // 初期描画
    render();
  </script>
</body>
</html>
